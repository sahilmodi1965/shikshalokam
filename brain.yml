schema_version: 2

brand:
  name: "ShikshaLokam"
  slug: "shikshalokam"
  movement: "Shikshagraha"   # null for standalone brains

# One hive mind, equal contributors. Add a teammate here and the brain onboards them with full,
# identical access — no tiers, no owners, no one to wait on. The session hooks validate the local
# git identity against this roster so every save is correctly attributed (name + email). To add a
# person or a whole new team, append to this list.
team:
  - name: "Sonal Bhasin"
    email: "sonal@shikshalokam.org"
  - name: "Sahil Modi"
    email: "modi.sahil.im@gmail.com"
  - name: "Ayush Tank"
    email: "ayushtank@shikshalokam.org"   # github: ayushtank2001 — joined 2026-06-11
  - name: "Aquib Rizwan"
    email: "aquib@shikshalokam.org"        # github: aquibrizwan16 — joined 2026-06-11
  - name: "Sahid Modi"
    email: ""   # TODO add Sahid's git email so his commits attribute correctly (only human follow-up here)

config:
  # Where produced drafts land. "none" = drafts live in the chat reply. "github-pages" = output/
  # archive. "drive" = drafts written to Drive via MCP (a future "act for the team" seam).
  output_channel: "none"   # github-pages | drive | none

  # How good content enters the brain. "in-session" = absorb immediately — sourced + typed into
  # wiki/ with a valid _status, no approval queue (structure still enforced by lint, so absorb
  # freely never means corrupt freely). "deferred" = only fold in when asked.
  absorb_content: "in-session"   # in-session | deferred

  # Never read sibling brain repos. Lint + permissions enforce. (Retained from the original intent.)
  cross_brain_wall: true

  # The published site is generated from sources and verified drift-free at every entry point
  # (session start, session end, and CI on every push). Always on.
  generated_site: true

# Google Workspace engine (tools/gsuite/). One shared Desktop OAuth app; each teammate logs in
# once (browser consent) and their token lives in ~/.shikshalokam/, outside the repo. The brain
# drives gs.py for them — they just talk. Setup + onboarding: onboarding/gsuite-setup.md.
gsuite:
  enabled: true
  # Outward-facing actions are always gated by an explicit human yes.
  send_policy: "approval-gated"     # email-send and calendar --notify require a clear yes
  # Content workflow: the repo (+ generated site) is the source of truth / dashboard.
  # Content lives in the brain — versioned, visible — until Sonal approves it explicitly;
  # ONLY then is the approved version written to Drive. See CLAUDE.md "The content workflow".
  source_of_truth: "this repo + generated site (content dashboard)"
  drive_publish: "on-explicit-approval"
  approver: "Sonal Bhasin <sonal@shikshalokam.org>"
  token_dir: "~/.shikshalokam"      # personal tokens, never committed
  output_root: "ShikshaLokam — Brain Output"   # one tidy shared folder; never raw dumps
  # The brain generates approved content into these subfolders (drive-init builds them).
  output_taxonomy:
    - "Emails"
    - "Docs"
    - "Decks"
    - "Social"
    - "Newsletters"
